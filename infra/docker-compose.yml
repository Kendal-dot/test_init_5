version: "3.9"

# ============================================================
# Lokal mĂ¶testranskriberingsplattform
# KĂ¶r: docker compose up --build
#
# GPU-krav: NVIDIA Container Toolkit mĂĄste vara installerat.
# Se docs/setup.md fĂ¶r instruktioner.
# ============================================================

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: transcriber-backend
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      # KĂ¤llkod (fĂ¶r hot-reload i dev)
      - ../backend:/app
      # Persistent lagring utanfĂ¶r containern
      - transcriber_storage:/app/storage
      # Modellcache: undviker nedladdning vid varje omstart
      - transcriber_models:/app/storage/models_cache
    ports:
      - "8000:8000"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: transcriber-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  transcriber_storage:
    driver: local
  transcriber_models:
    driver: local
